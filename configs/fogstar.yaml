seed: 42
paths:
  fogstar_zip: data/fogstar/17838806.zip
  tug_output_dir: outputs/tug
  output_dir: outputs/fogstar
data:
  target_mode: activity6
  drop_activity_zero: true
  raw_hz: 60
  target_hz: 20
  max_seq_len: 4000
  min_seq_len: 20
  convert_acc_g_to_ms2: true
  convert_gyro_deg_to_rad: true
  freeacc_method: rolling_center
  freeacc_rolling_sec: 1.0
split:
  train_subjects: 11
  val_subjects: 5
  test_subjects: 6
  stratify_by_has_fog: true
model:
  conv_channels: 64
  lstm_hidden: 64
  source_dropout: 0.25
training:
  device: auto
  torch_num_threads: null
  num_workers: 0
  pin_memory: true
  batch_size: 4
  max_epochs: 120
  patience: 15
  grad_clip: 1.0
  use_amp: false
frozen_head_configs:
- hidden_dims: []
  dropout: 0.0
  learning_rate: 0.001
  weight_decay: 0.001
- hidden_dims:
  - 32
  dropout: 0.2
  learning_rate: 0.001
  weight_decay: 0.001
- hidden_dims:
  - 64
  dropout: 0.3
  learning_rate: 0.001
  weight_decay: 0.001
full_model_configs:
- dropout: 0.2
  learning_rate: 0.001
  weight_decay: 0.001
  encoder_lr_scale: 1.0
- dropout: 0.3
  learning_rate: 0.0005
  weight_decay: 0.001
  encoder_lr_scale: 1.0
- dropout: 0.3
  learning_rate: 0.001
  weight_decay: 0.001
  encoder_lr_scale: 0.2
